name: ci

# No paths-ignore: the branch ruleset requires the `lint`, `test`,
# `coverage`, and `build` checks on every PR to main. Skipping CI on
# docs-only changes (a former `paths-ignore` for docs/**, adr/**, *.md)
# left those required checks unreported, so docs-only PRs were stuck in
# a permanent BLOCKED merge state. Running the full suite on docs PRs is
# the bounded cost of keeping the required checks satisfiable; the Go
# steps pass trivially on an unchanged codebase.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # Each job leaves setup-go's module/build cache enabled (the action
  # default) so the ephemeral GH-hosted runners don't recompile the
  # world on every run. The earlier self-hosted runners persisted that
  # cache on local disk, so it was disabled there — that rationale is
  # gone on ubuntu-latest.
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: go test (race + coverage profile)
        run: go test -race -count=1 -timeout 2m -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage profile
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile
          path: coverage.out
          retention-days: 1

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: make build
        run: make build

  # e2e harness (yaad-index #1). Non-blocking; promote to required
  # in branch protection when stable.
  e2e:
    name: e2e (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: make e2e
        run: make e2e

  coverage:
    name: coverage
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Download coverage profile
        uses: actions/download-artifact@v8
        with:
          name: coverage-profile
      - name: Compute coverage
        id: cov
        run: |
          report=$(go tool cover -func=coverage.out)
          pct=$(printf '%s\n' "$report" | tail -1 | awk '{print $3}')
          {
            echo "pct=$pct"
            echo 'report<<EOF'
            printf '%s\n' "$report"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          {
            echo "## Coverage report"
            echo
            echo "**Total: $pct**"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Sticky coverage comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage
          message: |
            ## Coverage report

            **Total: ${{ steps.cov.outputs.pct }}**

            <details><summary>Per-function breakdown</summary>

            ```
            ${{ steps.cov.outputs.report }}
            ```

            </details>
