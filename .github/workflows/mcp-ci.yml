name: mcp-ci

on:
  push:
    branches: [main]
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp-ci.yml'

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
