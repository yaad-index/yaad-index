name: runner-debug

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/runner-debug.yml'

permissions:
  contents: read

jobs:
  probe-direct:
    name: probe-direct (no checkout action)
    runs-on: self-hosted
    steps:
      - name: token + repo probe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -x
          echo "::group::token-aware git ls-remote"
          git ls-remote https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }} 2>&1 | head -5 || true
          echo "::endgroup::"

          echo "::group::token-aware fetch of github.sha"
          mkdir -p /tmp/co && cd /tmp/co && rm -rf .git
          git init -q
          git remote add origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}
          git fetch --depth 1 origin "${{ github.sha }}" 2>&1 | head -10 || true
          echo "::endgroup::"

  probe-with-checkout:
    name: probe-with-checkout (actions/checkout@v6)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - run: echo "checkout succeeded"

  probe-with-checkout-v4:
    name: probe-with-checkout-v4
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: echo "checkout v4 succeeded"
